    data:
      redis:
        host: localhost
        port: 6379

  # 🔧 推荐方案：修改application.yml，禁用包扫描
  mybatis-plus:
    # Mapper XML文件位置
    mapper-locations: classpath*:mapper/*.xml

    # 类型别名包路径
    type-aliases-package: com.aiproject.smartcampus.pojo

    # 🔧 禁用TypeHandler包扫描，避免扫描到有问题的GenericEnumTypeHandler
    type-handlers-package: ""

    # MyBatis配置
    configuration:
      # 驱峰命名转换
      map-underscore-to-camel-case: true
      # 当查询结果为null时，也调用setter方法
      call-setters-on-nulls: true
      # 处理null值的JDBC类型
      jdbc-type-for-null: NULL
      # 日志实现（开发环境使用，生产环境建议关闭）
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      # 缓存配置
      cache-enabled: true
      # 延迟加载
      lazy-loading-enabled: false
      # 设置超时时间
      default-statement-timeout: 30
      # 设置最大行数限制
      default-fetch-size: 100

      # === 处理BLOB/CLOB的核心配置 ===
      # 执行器类型：SIMPLE、REUSE、BATCH
      default-executor-type: reuse
      # 自动映射行为：NONE、PARTIAL、FULL
      auto-mapping-behavior: partial
      # 处理未知列的行为：NONE、WARNING、FAILING
      auto-mapping-unknown-column-behavior: warning

      # === TEXT/BLOB处理的关键配置 ===
      # 使用实际的列名
      use-actual-param-name: true
      # 返回实例类型
      return-instance-for-empty-row: false
      # 收缩空白字符
      shrink-whitespaces-in-sql: false
      # 默认枚举类型处理器
      default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

      # === 新增BLOB/TEXT处理配置 ===
      # 积极的延迟加载（关闭以避免BLOB问题）
      aggressive-lazy-loading: false
      # 多个结果集处理
      multiple-result-sets-enabled: true
      # 使用列标签代替列名
      use-column-label: true
      # 使用生成的键
      use-generated-keys: false
      # 本地缓存作用域：SESSION 或 STATEMENT
      local-cache-scope: session
      # 默认脚本语言驱动
      default-scripting-language-driver: org.apache.ibatis.scripting.xmltags.XMLLanguageDriver

    # 全局配置
    global-config:
      # 数据库配置
      db-config:
        # 逻辑删除值(已删除)
        logic-delete-value: 1
        # 逻辑未删除值(未删除)
        logic-not-delete-value: 0
        # 主键类型（自动递增）
        id-type: auto
        # 字段策略
        insert-strategy: not_null
        update-strategy: not_null
        where-strategy: not_null

        # === 字段命名策略 ===
        # 数据库字段命名策略
        column-underline: true
        # 表名命名策略
        table-underline: true

      # === 横幅配置 ===
      banner: true

